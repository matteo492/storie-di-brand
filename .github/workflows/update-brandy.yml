name: "Update Brandy Episodes"

on:
  schedule:
    # Ogni giorno alle 04:00 UTC (06:00 CET)
    - cron: "0 4 * * *"
  workflow_dispatch: # Permette il trigger manuale da GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Update Brandy episodes
        run: node scripts/update-brandy-episodes.js

      - name: Update Storie di Brand podcast episodes
        run: node scripts/update-podcast-episodes.js

      - name: Update YouTube stats
        run: node scripts/update-youtube-stats.js
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "Brandy Bot"
          git config user.email "noreply@storiedi.brand"
          git add public/brandy-episodes.json public/podcast-episodes.json public/youtube-stats.json
          git diff --cached --quiet || git commit -m "chore: aggiorna episodi e stats YouTube"
          git push
